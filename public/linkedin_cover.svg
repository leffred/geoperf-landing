<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" role="img" aria-label="Geoperf LinkedIn cover">
  <title>Geoperf — bannière LinkedIn 1584×396</title>
  <desc>Bannière éditoriale : headline navy + wordmark à droite avec O bullseye amber.</desc>
  <rect x="0" y="0" width="1584" height="396" fill="#F1EFE8"/>
  <!-- Subtle horizontal grid (paper feel) -->
  <g opacity="0.08" stroke="#042C53" stroke-width="0.5">
    <line x1="0" y1="80" x2="1584" y2="80"/>
    <line x1="0" y1="160" x2="1584" y2="160"/>
    <line x1="0" y1="240" x2="1584" y2="240"/>
    <line x1="0" y1="320" x2="1584" y2="320"/>
  </g>
  <!-- Headline gauche : Recoleta-style serif navy + point amber -->
  <text x="100" y="180" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="62" font-weight="500" fill="#042C53" letter-spacing="-1.4">Mesurez votre visibilité</text>
  <text x="100" y="246" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="62" font-weight="500" fill="#042C53" letter-spacing="-1.4">dans les LLM<tspan fill="#EF9F27">.</tspan></text>
  <!-- Filet amber + sous-titre -->
  <line x1="100" y1="276" x2="280" y2="276" stroke="#EF9F27" stroke-width="2"/>
  <text x="100" y="312" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="500" fill="#042C53" opacity="0.7" letter-spacing="2.4">É T U D E S   ·   A U D I T S   ·   O P T I M I S A T I O N   G E O</text>
  <!-- Wordmark droite : geoperf complet avec O bullseye -->
  <text x="1240" y="200" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500" fill="#042C53" opacity="0.6" letter-spacing="2.4">G E N E R A T I V E   E N G I N E</text>
  <text x="1240" y="218" font-family="'JetBrains Mono', monospace" font-size="13" font-weight="500" fill="#042C53" opacity="0.6" letter-spacing="2.4">O P T I M I Z A T I O N</text>
  <text x="1240" y="280" font-family="'Source Serif Pro', 'Times New Roman', Georgia, serif" font-size="64" font-weight="500" fill="#042C53" letter-spacing="-1.6">geoperf</text>
  <!-- O bullseye : centré sur la 3e lettre -->
  <!-- "ge" advance ≈ 64px à 64pt, "o" advance ≈ 36px → centre o ≈ 1240+64+18 = 1322 ; y baseline 280 - 18 = 262 -->
  <circle cx="1322" cy="262" r="7" fill="#EF9F27"/>
  <text x="1240" y="320" font-family="'JetBrains Mono', monospace" font-size="14" fill="#042C53" opacity="0.6">geoperf.com</text>
</svg>
