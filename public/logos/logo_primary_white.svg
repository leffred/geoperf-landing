<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" role="img" aria-label="Geoperf (inversé)">
  <title>Geoperf — logo principal sur fond navy</title>
  <desc>Wordmark "geoperf" cream + sparkline cream pour fond navy.</desc>
  <g stroke="#F1EFE8" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="320" y1="160" x2="380" y2="120"/>
    <line x1="380" y1="120" x2="440" y2="150"/>
    <line x1="440" y1="150" x2="500" y2="100"/>
  </g>
  <circle cx="320" cy="160" r="9" fill="#F1EFE8"/>
  <circle cx="380" cy="120" r="9" fill="#F1EFE8"/>
  <circle cx="440" cy="150" r="9" fill="#F1EFE8"/>
  <circle cx="500" cy="100" r="9" fill="#EF9F27"/>
  <text x="300" y="270" font-family="'Inter', system-ui, sans-serif" font-size="120" font-weight="800" fill="#F1EFE8" letter-spacing="-3" text-anchor="middle">geoperf</text>
</svg>
